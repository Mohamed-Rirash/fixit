version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: fixit_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: fixit_user
      POSTGRES_PASSWORD: fixit_password
      POSTGRES_DB: fixit_dev

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixit_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
